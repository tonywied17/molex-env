<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f9b8e"/>
      <stop offset="100%" stop-color="#38ef7d"/>
    </linearGradient>
    <linearGradient id="key" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="val" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38ef7d"/>
      <stop offset="100%" stop-color="#0f9b8e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle grid pattern (config file feel) -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="16" y1="116" x2="496" y2="116"/>
    <line x1="16" y1="176" x2="496" y2="176"/>
    <line x1="16" y1="236" x2="496" y2="236"/>
    <line x1="16" y1="296" x2="496" y2="296"/>
    <line x1="16" y1="356" x2="496" y2="356"/>
    <line x1="16" y1="416" x2="496" y2="416"/>
  </g>

  <!-- Document/file shape (represents .menv file) -->
  <g transform="translate(256, 210)" filter="url(#glow)">
    <!-- File body -->
    <rect x="-100" y="-120" width="200" height="240" rx="12" ry="12" fill="#1e2a45" stroke="url(#accent)" stroke-width="2.5" opacity="0.9"/>
    <!-- Dog-ear fold -->
    <path d="M60,-120 L100,-120 L100,-80 Z" fill="#1a1a2e" stroke="url(#accent)" stroke-width="2.5"/>
    <path d="M60,-120 L60,-80 L100,-80" fill="none" stroke="url(#accent)" stroke-width="2.5"/>

    <!-- Key=Value lines inside the document -->
    <!-- Line 1: PORT=3000 -->
    <rect x="-75" y="-80" width="40" height="12" rx="3" fill="url(#key)" opacity="0.9"/>
    <rect x="-30" y="-80" width="6" height="12" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="-18" y="-80" width="50" height="12" rx="3" fill="url(#val)" opacity="0.9"/>

    <!-- Line 2: DEBUG=true -->
    <rect x="-75" y="-55" width="50" height="12" rx="3" fill="url(#key)" opacity="0.9"/>
    <rect x="-20" y="-55" width="6" height="12" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="-8" y="-55" width="35" height="12" rx="3" fill="url(#val)" opacity="0.9"/>

    <!-- Line 3: URL=... -->
    <rect x="-75" y="-30" width="28" height="12" rx="3" fill="url(#key)" opacity="0.9"/>
    <rect x="-42" y="-30" width="6" height="12" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="-30" y="-30" width="70" height="12" rx="3" fill="url(#val)" opacity="0.9"/>

    <!-- Comment line -->
    <rect x="-75" y="-5" width="90" height="12" rx="3" fill="#4a5568" opacity="0.4"/>

    <!-- Line 4 -->
    <rect x="-75" y="20" width="55" height="12" rx="3" fill="url(#key)" opacity="0.9"/>
    <rect x="-15" y="20" width="6" height="12" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="-3" y="20" width="42" height="12" rx="3" fill="url(#val)" opacity="0.9"/>
  </g>

  <!-- Profile badge (top-right overlay) -->
  <g transform="translate(340, 130)">
    <rect x="-30" y="-14" width="60" height="28" rx="14" fill="url(#accent)" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="13" font-weight="bold" fill="#1a1a2e">.prod</text>
  </g>

  <!-- Cascading layers indicator (bottom-left) -->
  <g transform="translate(148, 270)" opacity="0.6">
    <rect x="-8" y="-8" width="16" height="16" rx="3" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <rect x="-3" y="-3" width="16" height="16" rx="3" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <rect x="2" y="2" width="16" height="16" rx="3" fill="url(#accent)" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- "molex-env" text -->
  <text x="256" y="420" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace, 'Courier New'" font-size="48" font-weight="700" fill="#fff" letter-spacing="-1">
    molex<tspan fill="url(#accent)">-env</tspan>
  </text>

  <!-- Tagline -->
  <text x="256" y="455" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="16" fill="#8892a4" letter-spacing="3" font-weight="400">
    TYPED CONFIG LOADER
  </text>
</svg>
